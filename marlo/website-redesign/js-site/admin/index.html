<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — John Skinner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #181e38; --navy-light: #272e66;
      --gold: #c8ba9a; --gold-light: #d4cdb8;
      --cream: #f6f6f3; --white: #fff;
      --grey: #5a6373; --warm-bg: #efede9;
      --text: #1e1e1e; --red: #e52328;
      --amber: #d97706;
      --font-serif: 'EB Garamond', Georgia, serif;
      --font-sans: 'Open Sans', Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--cream); color: var(--text); min-height: 100vh; }

    header {
      background: #2d1a0e; border-bottom: 3px solid #c0392b;
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px;
    }
    .logo { font-family: var(--font-serif); font-size: 1.6rem; color: var(--white); text-decoration: none; }
    .logo span { color: var(--gold); }
    .admin-tag { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold-light); margin-left: 0.6rem; opacity: 0.7; }
    #logout-btn {
      background: transparent; border: 1px solid var(--gold); color: var(--gold);
      padding: 0.4rem 1rem; border-radius: 3px; cursor: pointer;
      font-family: var(--font-sans); font-size: 0.8rem; letter-spacing: 0.05em;
    }
    #logout-btn:hover { background: var(--gold); color: var(--navy); }

    .denied, .spinner { text-align: center; padding: 4rem 2rem; color: var(--grey); }
    .denied h2 { font-family: var(--font-serif); font-size: 1.8rem; color: var(--navy); margin-bottom: 0.5rem; }

    .layout { max-width: 1300px; margin: 0 auto; padding: 2rem 1.5rem; display: grid; grid-template-columns: 1fr 320px; gap: 2rem; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

    /* FILTERS */
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .filter-btn {
      padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid #ddd;
      background: var(--white); color: var(--grey); cursor: pointer;
      font-size: 0.8rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
      transition: all 0.2s;
    }
    .filter-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

    /* SECTION TITLE */
    .section-title { font-family: var(--font-serif); font-size: 1.5rem; color: var(--navy); margin-bottom: 1rem; }

    /* QUOTE TABLE */
    .quote-table { background: var(--white); border-radius: 6px; border: 1px solid #e8e6e0; overflow: hidden; }
    .qt-row {
      display: grid;
      grid-template-columns: 2fr 2fr 1fr 1fr 1fr 32px;
      gap: 0.8rem; align-items: center;
      padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--cream);
      cursor: pointer; transition: background 0.15s; text-decoration: none; color: inherit;
    }
    .qt-row:hover { background: var(--cream); }
    .qt-row.header {
      background: var(--navy); color: var(--white); cursor: default;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600;
    }
    .qt-row.header:hover { background: var(--navy); }
    .customer-name { font-weight: 600; font-size: 0.9rem; }
    .customer-loc { font-size: 0.75rem; color: var(--grey); }
    .car-info { font-size: 0.88rem; }
    .assigned-to { font-size: 0.8rem; color: var(--grey); }
    .last-activity { font-size: 0.78rem; color: var(--grey); }
    .unread-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); display: inline-block; }

    /* BADGES */
    .badge {
      display: inline-block; padding: 0.2rem 0.65rem;
      border-radius: 20px; font-size: 0.68rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap;
    }
    .badge-open { background: #dbeafe; color: #1e40af; }
    .badge-quoted { background: #fef9ee; color: #92400e; }
    .badge-samples_sent { background: #ede9fe; color: #5b21b6; }
    .badge-accepted { background: #dcfce7; color: #166534; }
    .badge-in_production { background: #ffedd5; color: #9a3412; }
    .badge-dispatched { background: #ccfbf1; color: #0f766e; }
    .badge-complete { background: #f3f4f6; color: #374151; }
    .badge-dormant { background: #f9fafb; color: #9ca3af; }
    .badge-cancelled { background: #fee2e2; color: #991b1b; }

    /* REMINDERS PANEL */
    .reminders-panel { }
    .reminder-card {
      background: var(--white); border-radius: 6px; border: 1px solid #e8e6e0;
      padding: 1rem 1.2rem; margin-bottom: 0.8rem;
    }
    .reminder-who { font-weight: 600; font-size: 0.88rem; color: var(--navy); }
    .reminder-car { font-size: 0.8rem; color: var(--grey); }
    .reminder-due { font-size: 0.8rem; font-weight: 600; margin: 0.5rem 0 0.3rem; }
    .reminder-due.overdue { color: var(--red); }
    .reminder-due.today { color: var(--amber); }
    .reminder-due.upcoming { color: #166534; }
    .reminder-notes { font-size: 0.8rem; color: var(--grey); margin-bottom: 0.6rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reminder-actions { display: flex; gap: 0.5rem; align-items: center; }
    .reminder-actions a { font-size: 0.78rem; color: var(--navy-light); text-decoration: none; }
    .reminder-actions a:hover { text-decoration: underline; }
    .btn-done {
      background: none; border: 1px solid #ddd; color: var(--grey);
      padding: 0.25rem 0.7rem; border-radius: 3px; cursor: pointer;
      font-size: 0.75rem; margin-left: auto;
    }
    .btn-done:hover { border-color: #166534; color: #166534; }
    .empty-reminders { font-size: 0.85rem; color: var(--grey); text-align: center; padding: 2rem 1rem; }
  </style>
</head>
<body>

<header>
  <a href="#" class="logo">John <span>Skinner</span><span class="admin-tag">⚙ Team Portal</span></a>
  <button id="logout-btn" onclick="logout()">Sign Out</button>
</header>

<div id="loading" class="spinner">Verifying access…</div>
<div id="denied" class="denied" style="display:none">
  <h2>Admin Sign In</h2>
  <p>Sign in with your JSM admin account.</p>
  <div style="max-width:340px;margin:24px auto 0;text-align:left;">
    <div style="margin-bottom:14px;">
      <label style="font-size:0.8rem;font-weight:700;color:var(--navy);display:block;margin-bottom:5px;">Email</label>
      <input id="admin-email" type="email" placeholder="your@email.com" style="width:100%;padding:10px 14px;border:1.5px solid #d8d2c8;border-radius:6px;font-size:0.9rem;font-family:var(--font-sans);">
    </div>
    <div style="margin-bottom:20px;">
      <label style="font-size:0.8rem;font-weight:700;color:var(--navy);display:block;margin-bottom:5px;">Password</label>
      <input id="admin-password" type="password" placeholder="••••••••" style="width:100%;padding:10px 14px;border:1.5px solid #d8d2c8;border-radius:6px;font-size:0.9rem;font-family:var(--font-sans);">
    </div>
    <button onclick="adminLogin()" style="width:100%;background:var(--navy);color:#fff;border:none;padding:13px;border-radius:6px;font-family:var(--font-sans);font-size:0.88rem;font-weight:700;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;">Sign in →</button>
    <p id="admin-login-error" style="color:#c0392b;font-size:0.8rem;margin-top:10px;display:none;"></p>
  </div>
</div>

<div id="main" style="display:none">
  <div class="layout">
    <!-- LEFT: Quote list -->
    <div>
      <h2 class="section-title">All Quotes</h2>
      <div class="filters" id="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('open', this)">Open</button>
        <button class="filter-btn" onclick="setFilter('quoted', this)">Quoted</button>
        <button class="filter-btn" onclick="setFilter('samples_sent', this)">Samples Sent</button>
        <button class="filter-btn" onclick="setFilter('accepted', this)">Accepted</button>
        <button class="filter-btn" onclick="setFilter('in_production', this)">In Production</button>
        <button class="filter-btn" onclick="setFilter('dormant', this)">Dormant</button>
      </div>
      <div class="quote-table">
        <div class="qt-row header">
          <div>Customer</div><div>Car</div><div>Status</div><div>Assigned</div><div>Last Activity</div><div></div>
        </div>
        <div id="quote-rows"><div class="spinner">Loading…</div></div>
      </div>
    </div>

    <!-- RIGHT: Reminders -->
    <div class="reminders-panel">
      <h2 class="section-title">Reminders (7 days)</h2>
      <div id="reminders-list"><div class="spinner">Loading…</div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://vojzzmqpectwswagftjv.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvanp6bXFwZWN0d3N3YWdmdGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjgwNzIsImV4cCI6MjA4ODE0NDA3Mn0.xJvKfh6QafvyQKR-lazAkFUrLHd_nXzPerOwZ0KSsUM'
  );

  let allQuotes = [];
  let currentFilter = 'all';

  function statusClass(s) { return 'badge badge-' + (s || 'open'); }
  function statusLabel(s) { return (s||'open').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  }

  async function logout() { await sb.auth.signOut(); location.reload(); }

  async function adminLogin() {
    const email = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-password').value;
    const err = document.getElementById('admin-login-error');
    err.style.display = 'none';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { err.textContent = error.message; err.style.display = 'block'; return; }
    location.reload();
  }

  function setFilter(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderQuotes();
  }

  function renderQuotes() {
    const filtered = currentFilter === 'all' ? allQuotes : allQuotes.filter(q => q.status === currentFilter);
    const container = document.getElementById('quote-rows');
    if (filtered.length === 0) {
      container.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--grey);font-size:0.88rem">No quotes found.</div>';
      return;
    }
    container.innerHTML = filtered.map(q => {
      const cust = q.customers || {};
      const name = [cust.first_name, cust.last_name].filter(Boolean).join(' ') || '—';
      const car = [q.marque, q.model, q.year ? `(${q.year})` : ''].filter(Boolean).join(' ');
      return `<a class="qt-row" href="quote.html?id=${q.id}">
        <div><div class="customer-name">${name}</div><div class="customer-loc">${cust.location || ''}</div></div>
        <div class="car-info">${car || '—'}</div>
        <div><span class="${statusClass(q.status)}">${statusLabel(q.status)}</span></div>
        <div class="assigned-to">${q.assigned_name || '—'}</div>
        <div class="last-activity">${formatDate(q.last_activity_at || q.created_at)}</div>
        <div>${q._unread ? '<span class="unread-dot" title="Unread messages"></span>' : ''}</div>
      </a>`;
    }).join('');
  }

  async function loadQuotes() {
    const { data: quotes } = await sb.from('quotes')
      .select('*, customers(*)')
      .order('last_activity_at', { ascending: false, nullsFirst: false });

    if (!quotes) return;

    // Load admin users for assigned names
    const { data: admins } = await sb.from('admin_users').select('id, name');
    const adminMap = {};
    (admins || []).forEach(a => adminMap[a.id] = a.name);

    // Load unread messages
    const qIds = quotes.map(q => q.id);
    let unreadSet = new Set();
    if (qIds.length > 0) {
      const { data: unread } = await sb.from('messages')
        .select('quote_id')
        .in('quote_id', qIds)
        .eq('sender_type', 'customer')
        .is('read_at', null);
      (unread || []).forEach(m => unreadSet.add(m.quote_id));
    }

    allQuotes = quotes.map(q => ({
      ...q,
      assigned_name: q.assigned_to ? adminMap[q.assigned_to] : null,
      _unread: unreadSet.has(q.id)
    }));
    renderQuotes();
  }

  async function loadReminders() {
    const today = new Date();
    const in7 = new Date(today); in7.setDate(in7.getDate() + 7);
    const { data: reminders } = await sb.from('follow_up_reminders')
      .select('*, quotes(marque, model, year, customer_id, customers(first_name, last_name))')
      .is('completed_at', null)
      .lte('due_date', in7.toISOString().split('T')[0])
      .order('due_date', { ascending: true });

    const container = document.getElementById('reminders-list');
    if (!reminders || reminders.length === 0) {
      container.innerHTML = '<div class="empty-reminders">No reminders due in the next 7 days.</div>';
      return;
    }

    const todayStr = today.toISOString().split('T')[0];
    container.innerHTML = reminders.map(r => {
      const q = r.quotes || {};
      const cust = q.customers || {};
      const name = [cust.first_name, cust.last_name].filter(Boolean).join(' ') || 'Customer';
      const car = [q.marque, q.model, q.year].filter(Boolean).join(' ') || 'Unknown car';
      const dueStr = r.due_date;
      const dueClass = dueStr < todayStr ? 'overdue' : dueStr === todayStr ? 'today' : 'upcoming';
      const dueLabel = dueStr < todayStr ? '🔴 Overdue: ' : dueStr === todayStr ? '🟡 Today: ' : '🟢 Due: ';
      return `<div class="reminder-card" id="rem-${r.id}">
        <div class="reminder-who">${name}</div>
        <div class="reminder-car">${car}</div>
        <div class="reminder-due ${dueClass}">${dueLabel}${formatDate(r.due_date)}</div>
        ${r.notes ? `<div class="reminder-notes">${r.notes}</div>` : ''}
        <div class="reminder-actions">
          <a href="quote.html?id=${r.quote_id}">View quote →</a>
          <button class="btn-done" onclick="markDone('${r.id}')">✓ Done</button>
        </div>
      </div>`;
    }).join('');
  }

  async function markDone(id) {
    await sb.from('follow_up_reminders').update({ completed_at: new Date().toISOString() }).eq('id', id);
    document.getElementById('rem-' + id)?.remove();
  }

  let adminLoaded = false;
  sb.auth.onAuthStateChange(async (event, session) => {
    if (adminLoaded) return;
    document.getElementById('loading').style.display = 'none';
    if (!session) { document.getElementById('denied').style.display = ''; return; }

    const { data: adminRow } = await sb.from('admin_users').select('id, name').eq('id', session.user.id).single();
    if (!adminRow) { document.getElementById('denied').style.display = ''; return; }

    adminLoaded = true;
    document.getElementById('denied').style.display = 'none';
    document.getElementById('main').style.display = '';
    await Promise.all([loadQuotes(), loadReminders()]);
  });
</script>
</body>
</html>

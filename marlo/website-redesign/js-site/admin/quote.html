<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Quote — John Skinner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #181e38; --navy-light: #272e66;
      --gold: #c8ba9a; --gold-light: #d4cdb8;
      --cream: #f6f6f3; --white: #fff;
      --grey: #5a6373; --warm-bg: #efede9;
      --text: #1e1e1e; --red: #e52328;
      --amber: #d97706; --amber-bg: #fffbeb;
      --font-serif: 'EB Garamond', Georgia, serif;
      --font-sans: 'Open Sans', Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-sans); background: var(--cream); color: var(--text); min-height: 100vh; }

    header {
      background: #2d1a0e; border-bottom: 3px solid #c0392b;
      padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 64px;
    }
    .logo { font-family: var(--font-serif); font-size: 1.5rem; color: var(--white); text-decoration: none; }
    .logo span { color: var(--gold); }
    .admin-tag { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--gold-light); margin-left: 0.5rem; opacity: 0.7; }
    #logout-btn {
      background: transparent; border: 1px solid var(--gold); color: var(--gold);
      padding: 0.35rem 0.9rem; border-radius: 3px; cursor: pointer;
      font-family: var(--font-sans); font-size: 0.78rem;
    }

    .breadcrumb { padding: 0.8rem 1.5rem; font-size: 0.8rem; color: var(--grey); }
    .breadcrumb a { color: var(--grey); text-decoration: none; }
    .breadcrumb a:hover { color: var(--navy); }
    .breadcrumb span { margin: 0 0.3rem; }

    /* THREE COLUMN LAYOUT */
    .three-col {
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      gap: 1rem;
      padding: 0 1.5rem 3rem;
      max-width: 1400px; margin: 0 auto;
      min-height: calc(100vh - 100px);
    }
    @media (max-width: 1100px) { .three-col { grid-template-columns: 240px 1fr; } .right-col { display: none; } }
    @media (max-width: 768px) { .three-col { grid-template-columns: 1fr; } }

    /* SHARED */
    .card { background: var(--white); border-radius: 6px; border: 1px solid #e8e6e0; padding: 1.2rem; margin-bottom: 1rem; }
    .card-title { font-family: var(--font-serif); font-size: 1.1rem; color: var(--navy); margin-bottom: 0.8rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--cream); }
    label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--grey); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.3rem; }
    input[type=text], input[type=date], select, textarea {
      width: 100%; padding: 0.6rem 0.8rem;
      border: 1px solid #ddd; border-radius: 4px;
      font-family: var(--font-sans); font-size: 0.85rem; color: var(--text);
      background: var(--white);
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--navy); }
    .form-group { margin-bottom: 0.8rem; }
    .btn-sm {
      padding: 0.45rem 1rem; border-radius: 4px; cursor: pointer;
      font-family: var(--font-sans); font-size: 0.8rem; font-weight: 600;
      border: none; letter-spacing: 0.04em;
    }
    .btn-navy { background: var(--navy); color: var(--white); }
    .btn-navy:hover { background: var(--navy-light); }
    .btn-ghost { background: none; border: 1px solid #ddd; color: var(--grey); }
    .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }
    .btn-danger { background: none; border: 1px solid #ddd; color: var(--grey); }
    .btn-danger:hover { border-color: var(--red); color: var(--red); }

    /* BADGES */
    .badge { display: inline-block; padding: 0.2rem 0.65rem; border-radius: 20px; font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .badge-open { background: #dbeafe; color: #1e40af; }
    .badge-quoted { background: #fef9ee; color: #92400e; }
    .badge-samples_sent { background: #ede9fe; color: #5b21b6; }
    .badge-accepted { background: #dcfce7; color: #166534; }
    .badge-in_production { background: #ffedd5; color: #9a3412; }
    .badge-dispatched { background: #ccfbf1; color: #0f766e; }
    .badge-complete { background: #f3f4f6; color: #374151; }
    .badge-dormant { background: #f9fafb; color: #9ca3af; }
    .badge-cancelled { background: #fee2e2; color: #991b1b; }

    /* LEFT COL */
    .editable-field {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.35rem 0; border-bottom: 1px solid transparent;
      cursor: pointer; border-radius: 3px;
    }
    .editable-field:hover { background: var(--cream); }
    .editable-field .field-label { font-size: 0.7rem; color: var(--grey); text-transform: uppercase; letter-spacing: 0.06em; width: 80px; flex-shrink: 0; }
    .editable-field .field-value { font-size: 0.88rem; color: var(--text); flex: 1; }
    .editable-field .edit-icon { font-size: 0.7rem; color: var(--grey); opacity: 0; }
    .editable-field:hover .edit-icon { opacity: 1; }
    .edit-mode { display: none; gap: 0.4rem; align-items: center; margin-bottom: 0.5rem; }
    .edit-mode input { flex: 1; }

    /* ITEMS */
    .item-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0; border-bottom: 1px solid var(--cream); }
    .item-row:last-child { border-bottom: none; }
    .item-info { flex: 1; }
    .item-name { font-size: 0.87rem; font-weight: 600; color: var(--navy); }
    .item-name.inactive { text-decoration: line-through; opacity: 0.5; }
    .item-sub { font-size: 0.75rem; color: var(--grey); }
    .toggle-active {
      width: 30px; height: 18px; border-radius: 10px; border: none; cursor: pointer;
      transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-active.on { background: #166534; }
    .toggle-active.off { background: #d1d5db; }

    /* MESSAGES */
    .messages-col { display: flex; flex-direction: column; height: calc(100vh - 120px); min-height: 600px; }
    .msg-thread-card { flex: 1; background: var(--white); border-radius: 6px; border: 1px solid #e8e6e0; display: flex; flex-direction: column; overflow: hidden; }
    .thread-toggle { display: flex; border-bottom: 1px solid var(--cream); }
    .thread-tab {
      flex: 1; padding: 0.7rem; text-align: center; cursor: pointer;
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--grey); border: none; background: transparent;
      transition: all 0.2s;
    }
    .thread-tab.active { color: var(--navy); border-bottom: 3px solid var(--gold); }
    .messages-scroll { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg-bubble { max-width: 80%; }
    .msg-bubble.customer { align-self: flex-start; }
    .msg-bubble.admin-external { align-self: flex-end; }
    .msg-bubble.admin-internal { align-self: flex-end; }
    .msg-content { padding: 0.7rem 1rem; border-radius: 10px; font-size: 0.875rem; line-height: 1.5; }
    .msg-bubble.customer .msg-content { background: var(--cream); color: var(--navy); border-bottom-left-radius: 3px; }
    .msg-bubble.admin-external .msg-content { background: var(--navy); color: var(--white); border-bottom-right-radius: 3px; }
    .msg-bubble.admin-internal .msg-content { background: var(--amber-bg); color: var(--text); border: 1px solid #fde68a; border-bottom-right-radius: 3px; }
    .msg-meta { font-size: 0.7rem; color: var(--grey); margin-top: 0.25rem; }
    .msg-bubble.admin-external .msg-meta, .msg-bubble.admin-internal .msg-meta { text-align: right; }
    .internal-tag { font-size: 0.68rem; font-weight: 600; color: var(--amber); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.15rem; }
    .msg-sender-name { font-size: 0.7rem; font-weight: 600; color: var(--navy-light); margin-bottom: 0.15rem; }
    .msg-attachments a { display: inline-block; font-size: 0.75rem; color: var(--gold); text-decoration: none; margin-right: 0.4rem; margin-top: 0.3rem; }

    /* ADMIN INPUT */
    .admin-input { padding: 0.8rem; border-top: 1px solid var(--cream); }
    .type-toggle { display: flex; gap: 0.4rem; margin-bottom: 0.6rem; }
    .type-btn {
      padding: 0.3rem 0.8rem; border-radius: 20px; border: 1px solid #ddd;
      background: var(--white); color: var(--grey); cursor: pointer;
      font-size: 0.75rem; font-weight: 600;
    }
    .type-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .type-btn.internal.active { background: var(--amber); border-color: var(--amber); color: var(--white); }
    .admin-input textarea { width: 100%; height: 70px; padding: 0.6rem; border: 1px solid #ddd; border-radius: 4px; font-family: var(--font-sans); font-size: 0.85rem; resize: none; }
    .input-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; align-items: center; }
    .attach-preview { font-size: 0.75rem; color: var(--grey); flex: 1; }

    /* RIGHT COL */
    .reminder-existing { background: var(--warm-bg); border-radius: 4px; padding: 0.8rem; margin-bottom: 0.8rem; font-size: 0.85rem; }
    .reminder-existing .due { font-weight: 600; color: var(--navy); margin-bottom: 0.3rem; }
    .timeline-item { display: flex; gap: 0.8rem; padding: 0.5rem 0; border-bottom: 1px solid var(--cream); }
    .timeline-item:last-child { border-bottom: none; }
    .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); margin-top: 5px; flex-shrink: 0; }
    .timeline-text { font-size: 0.82rem; color: var(--text); }
    .timeline-date { font-size: 0.72rem; color: var(--grey); }
    .customer-info-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .customer-info-row label { margin: 0; width: 60px; }
    .customer-info-row span { font-size: 0.85rem; }
    .copy-btn { background: none; border: 1px solid #ddd; color: var(--grey); padding: 0.2rem 0.5rem; border-radius: 3px; cursor: pointer; font-size: 0.7rem; }
    .copy-btn:hover { border-color: var(--navy); color: var(--navy); }

    .denied, .spinner { text-align: center; padding: 4rem 2rem; color: var(--grey); }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">John <span>Skinner</span><span class="admin-tag">⚙ Team Portal</span></a>
  <button id="logout-btn" onclick="logout()">Sign Out</button>
</header>

<div id="loading" class="spinner">Loading…</div>
<div id="denied" class="denied" style="display:none"><h2>Access Denied</h2></div>

<div id="main" style="display:none">
  <div class="breadcrumb">
    <a href="index.html">Admin</a><span>›</span>
    <span id="bread-car">Quote</span>
  </div>

  <div class="three-col">
    <!-- LEFT: Quote info -->
    <div class="left-col">
      <!-- Car details (editable) -->
      <div class="card">
        <div class="card-title">Car Details</div>
        <div id="car-fields"></div>
        <div style="margin-top:0.5rem">
          <select id="status-select" onchange="updateStatus()" style="margin-bottom:0.6rem">
            <option value="open">Open</option>
            <option value="quoted">Quoted</option>
            <option value="samples_sent">Samples Sent</option>
            <option value="accepted">Accepted</option>
            <option value="in_production">In Production</option>
            <option value="dispatched">Dispatched</option>
            <option value="complete">Complete</option>
            <option value="dormant">Dormant</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <div class="form-group">
            <label>Assigned To</label>
            <select id="assigned-select" onchange="updateAssigned()"></select>
          </div>
        </div>
      </div>

      <!-- Quote items -->
      <div class="card">
        <div class="card-title">Quote Items</div>
        <div id="items-list"></div>
        <div style="margin-top:1rem;padding-top:0.8rem;border-top:1px solid var(--cream)">
          <div class="form-group"><label>Item Name</label><input type="text" id="new-item-name" placeholder="e.g. Door Cards" /></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem">
            <div class="form-group"><label>Material</label><input type="text" id="new-item-mat" placeholder="Leather" /></div>
            <div class="form-group"><label>Colour</label><input type="text" id="new-item-col" placeholder="Black" /></div>
          </div>
          <button class="btn-sm btn-navy" onclick="addItem()" style="width:100%">+ Add Item</button>
        </div>
      </div>

      <!-- Internal notes -->
      <div class="card">
        <div class="card-title">Internal Notes</div>
        <textarea id="internal-notes" style="height:100px;width:100%;padding:0.6rem;border:1px solid #ddd;border-radius:4px;font-family:var(--font-sans);font-size:0.85rem;resize:vertical"
          placeholder="Notes visible only to admin team…" onblur="saveNotes()"></textarea>
      </div>
    </div>

    <!-- CENTRE: Messages -->
    <div class="messages-col">
      <div class="msg-thread-card">
        <div class="thread-toggle">
          <button class="thread-tab active" id="tab-customer" onclick="switchThread('customer')">Customer Conversation</button>
          <button class="thread-tab" id="tab-internal" onclick="switchThread('internal')">Internal Notes</button>
        </div>
        <div class="messages-scroll" id="messages-scroll"></div>
        <div class="admin-input">
          <div class="type-toggle">
            <button class="type-btn active" id="type-reply" onclick="setMsgType('reply')">Reply to Customer</button>
            <button class="type-btn internal" id="type-internal" onclick="setMsgType('internal')">Internal Note</button>
          </div>
          <textarea id="admin-msg-text" placeholder="Type your message…"></textarea>
          <div class="input-actions">
            <button class="btn-sm btn-ghost" onclick="document.getElementById('admin-file').click()">📎 Attach</button>
            <input type="file" id="admin-file" style="display:none" onchange="handleAttach(this)" />
            <span class="attach-preview" id="attach-preview"></span>
            <button class="btn-sm btn-navy" onclick="sendAdminMsg()">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT: CRM -->
    <div class="right-col">
      <!-- Reminder -->
      <div class="card">
        <div class="card-title">Follow-up Reminder</div>
        <div id="existing-reminder"></div>
        <div class="form-group"><label>Date</label><input type="date" id="rem-date" /></div>
        <div class="form-group"><label>Notes</label><textarea id="rem-notes" style="height:70px;width:100%;padding:0.6rem;border:1px solid #ddd;border-radius:4px;font-family:var(--font-sans);font-size:0.85rem;resize:vertical"></textarea></div>
        <button class="btn-sm btn-navy" onclick="setReminder()" style="width:100%">Set Reminder</button>
        <div id="rem-msg" style="font-size:0.8rem;margin-top:0.5rem;color:var(--grey)"></div>
      </div>

      <!-- Timeline -->
      <div class="card">
        <div class="card-title">Quote History</div>
        <div id="timeline"></div>
      </div>

      <!-- Customer info -->
      <div class="card">
        <div class="card-title">Customer</div>
        <div id="customer-info"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://vojzzmqpectwswagftjv.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvanp6bXFwZWN0d3N3YWdmdGp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NjgwNzIsImV4cCI6MjA4ODE0NDA3Mn0.xJvKfh6QafvyQKR-lazAkFUrLHd_nXzPerOwZ0KSsUM'
  );

  const params = new URLSearchParams(location.search);
  const quoteId = params.get('id');
  let quoteData = null, customerData = null, adminUser = null;
  let currentThread = 'customer'; // 'customer' | 'internal'
  let msgType = 'reply'; // 'reply' | 'internal'
  let pendingAttachments = [];
  let adminsList = [];

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
  function statusLabel(s) { return (s||'open').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
  function formatDate(d) { return d ? new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—'; }
  function relTime(d) {
    const diff = Date.now() - new Date(d).getTime();
    const mins = Math.floor(diff/60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins/60);
    if (hrs < 24) return `${hrs}h ago`;
    return formatDate(d);
  }

  async function logout() { await sb.auth.signOut(); location.href = 'index.html'; }

  // CAR FIELDS (editable)
  const CAR_FIELDS = ['marque','model','year','chassis','driver_side','paint_colour'];
  const CAR_LABELS = ['Marque','Model','Year','Chassis No.','Driver Side','Paint Colour'];

  function renderCarFields() {
    const q = quoteData;
    document.getElementById('car-fields').innerHTML = CAR_FIELDS.map((f, i) => `
      <div class="editable-field" onclick="startEdit('${f}')">
        <span class="field-label">${CAR_LABELS[i]}</span>
        <span class="field-value" id="fv-${f}">${q[f] || '—'}</span>
        <span class="edit-icon">✎</span>
      </div>
      <div class="edit-mode" id="em-${f}">
        <input type="text" id="ei-${f}" value="${q[f] || ''}" />
        <button class="btn-sm btn-navy" onclick="saveField('${f}')">Save</button>
        <button class="btn-sm btn-ghost" onclick="cancelEdit('${f}')">✕</button>
      </div>
    `).join('');
  }

  function startEdit(f) {
    document.querySelectorAll('.editable-field').forEach(el => el.style.display = '');
    document.querySelectorAll('.edit-mode').forEach(el => el.style.display = 'none');
    document.querySelector(`.editable-field[onclick="startEdit('${f}')"]`).style.display = 'none';
    document.getElementById('em-' + f).style.display = 'flex';
    document.getElementById('ei-' + f).focus();
  }

  function cancelEdit(f) {
    document.querySelectorAll('.editable-field').forEach(el => el.style.display = '');
    document.getElementById('em-' + f).style.display = 'none';
  }

  async function saveField(f) {
    const val = document.getElementById('ei-' + f).value.trim();
    await sb.from('quotes').update({ [f]: val }).eq('id', quoteId);
    quoteData[f] = val;
    document.getElementById('fv-' + f).textContent = val || '—';
    cancelEdit(f);
  }

  async function updateStatus() {
    const status = document.getElementById('status-select').value;
    await sb.from('quotes').update({ status }).eq('id', quoteId);
  }

  async function updateAssigned() {
    const assigned_to = document.getElementById('assigned-select').value || null;
    await sb.from('quotes').update({ assigned_to }).eq('id', quoteId);
  }

  async function saveNotes() {
    const notes = document.getElementById('internal-notes').value;
    await sb.from('quotes').update({ internal_notes: notes }).eq('id', quoteId);
  }

  async function loadItems() {
    const { data: items } = await sb.from('quote_items').select('*').eq('quote_id', quoteId);
    const container = document.getElementById('items-list');
    if (!items || items.length === 0) {
      container.innerHTML = '<p style="color:var(--grey);font-size:0.82rem">No items yet.</p>';
      return;
    }
    container.innerHTML = items.map(item => `
      <div class="item-row" id="qi-${item.id}">
        <div class="item-info">
          <div class="item-name ${item.active ? '' : 'inactive'}" id="qin-${item.id}">${item.name}</div>
          <div class="item-sub">${[item.material, item.colour].filter(Boolean).join(' · ')}</div>
        </div>
        <button class="toggle-active ${item.active ? 'on' : 'off'}" id="qit-${item.id}"
          title="${item.active ? 'Deactivate' : 'Activate'}" onclick="toggleItem('${item.id}', ${!item.active})"></button>
      </div>
    `).join('');
  }

  async function toggleItem(id, newActive) {
    await sb.from('quote_items').update({ active: newActive }).eq('id', id);
    document.getElementById('qin-' + id)?.classList.toggle('inactive', !newActive);
    const btn = document.getElementById('qit-' + id);
    if (btn) { btn.className = 'toggle-active ' + (newActive ? 'on' : 'off'); btn.title = newActive ? 'Deactivate' : 'Activate'; }
  }

  async function addItem() {
    const name = document.getElementById('new-item-name').value.trim();
    const material = document.getElementById('new-item-mat').value.trim();
    const colour = document.getElementById('new-item-col').value.trim();
    if (!name) return;
    await sb.from('quote_items').insert({ quote_id: quoteId, name, material, colour, active: true, added_by: 'admin' });
    document.getElementById('new-item-name').value = '';
    document.getElementById('new-item-mat').value = '';
    document.getElementById('new-item-col').value = '';
    loadItems();
  }

  function switchThread(tab) {
    currentThread = tab;
    document.getElementById('tab-customer').classList.toggle('active', tab === 'customer');
    document.getElementById('tab-internal').classList.toggle('active', tab === 'internal');
    loadMessages();
  }

  function setMsgType(type) {
    msgType = type;
    document.getElementById('type-reply').classList.toggle('active', type === 'reply');
    document.getElementById('type-internal').classList.toggle('active', type === 'internal');
    document.getElementById('admin-msg-text').placeholder = type === 'internal' ? 'Internal note (not visible to customer)…' : 'Reply to customer…';
  }

  function buildBubble(msg) {
    const isCustomer = msg.sender_type === 'customer';
    const isInternal = msg.is_internal;
    let cls = isCustomer ? 'customer' : (isInternal ? 'admin-internal' : 'admin-external');
    const attachHtml = (msg.attachments || []).length > 0 ?
      `<div class="msg-attachments">${msg.attachments.map(a=>`<a href="${a.url}" target="_blank">📎 ${a.name}</a>`).join('')}</div>` : '';
    return `<div class="msg-bubble ${cls}">
      ${isInternal ? '<div class="internal-tag">Internal only</div>' : ''}
      ${!isCustomer && !isInternal && msg.sender_name ? `<div class="msg-sender-name">${msg.sender_name}</div>` : ''}
      ${isCustomer && msg.sender_name ? `<div class="msg-sender-name">${msg.sender_name}</div>` : ''}
      <div class="msg-content">${esc(msg.body || '')}${attachHtml}</div>
      <div class="msg-meta">${relTime(msg.created_at)}</div>
    </div>`;
  }

  async function loadMessages() {
    let query = sb.from('messages').select('*').eq('quote_id', quoteId);
    if (currentThread === 'customer') query = query.eq('is_internal', false);
    else query = query.eq('is_internal', true);
    query = query.order('created_at', { ascending: true });
    const { data: msgs } = await query;
    const scroll = document.getElementById('messages-scroll');
    if (!msgs || msgs.length === 0) {
      scroll.innerHTML = `<p style="color:var(--grey);font-size:0.85rem;text-align:center;padding:2rem">No ${currentThread === 'internal' ? 'internal notes' : 'messages'} yet.</p>`;
      return;
    }
    scroll.innerHTML = msgs.map(buildBubble).join('');
    scroll.scrollTop = scroll.scrollHeight;
  }

  async function handleAttach(input) {
    const file = input.files[0]; if (!file) return;
    document.getElementById('attach-preview').textContent = 'Uploading…';
    const path = `${quoteId}/${Date.now()}_${file.name}`;
    const { error } = await sb.storage.from('attachments').upload(path, file);
    if (error) { document.getElementById('attach-preview').textContent = 'Failed'; return; }
    const { data: { publicUrl } } = sb.storage.from('attachments').getPublicUrl(path);
    pendingAttachments.push({ name: file.name, url: publicUrl });
    document.getElementById('attach-preview').textContent = file.name + ' ready';
  }

  async function sendAdminMsg() {
    const text = document.getElementById('admin-msg-text').value.trim();
    const isInternal = msgType === 'internal';
    if (!text && pendingAttachments.length === 0) return;
    const payload = {
      quote_id: quoteId,
      sender_type: 'admin',
      sender_name: adminUser?.name || 'Admin',
      body: text,
      attachments: pendingAttachments,
      is_internal: isInternal
    };
    await sb.from('messages').insert(payload);
    if (!isInternal) {
      await sb.from('quotes').update({ last_activity_at: new Date().toISOString() }).eq('id', quoteId);
    }
    document.getElementById('admin-msg-text').value = '';
    document.getElementById('attach-preview').textContent = '';
    document.getElementById('admin-file').value = '';
    pendingAttachments = [];
    if ((isInternal && currentThread === 'internal') || (!isInternal && currentThread === 'customer')) {
      loadMessages();
    }
  }

  async function loadAdmins() {
    const { data } = await sb.from('admin_users').select('id, name');
    adminsList = data || [];
    const sel = document.getElementById('assigned-select');
    sel.innerHTML = '<option value="">Unassigned</option>' + adminsList.map(a => `<option value="${a.id}" ${quoteData?.assigned_to === a.id ? 'selected' : ''}>${a.name}</option>`).join('');
  }

  async function loadReminder() {
    const { data: rem } = await sb.from('follow_up_reminders')
      .select('*').eq('quote_id', quoteId).eq('done', false).single();
    const container = document.getElementById('existing-reminder');
    if (rem) {
      container.innerHTML = `<div class="reminder-existing">
        <div class="due">📅 ${formatDate(rem.due_date)}</div>
        ${rem.notes ? `<div style="font-size:0.8rem;color:var(--grey)">${rem.notes}</div>` : ''}
        <button class="btn-sm btn-ghost" style="margin-top:0.6rem" onclick="markReminderDone('${rem.id}')">✓ Mark Done</button>
      </div>`;
    } else {
      container.innerHTML = '';
    }
  }

  async function setReminder() {
    const due_date = document.getElementById('rem-date').value;
    const notes = document.getElementById('rem-notes').value.trim();
    if (!due_date) { document.getElementById('rem-msg').textContent = 'Please set a date.'; return; }
    await sb.from('follow_up_reminders').insert({ quote_id: quoteId, due_date, notes, done: false });
    document.getElementById('rem-msg').textContent = 'Reminder set!';
    document.getElementById('rem-date').value = '';
    document.getElementById('rem-notes').value = '';
    loadReminder();
  }

  async function markReminderDone(id) {
    await sb.from('follow_up_reminders').update({ done: true }).eq('id', id);
    loadReminder();
  }

  function renderTimeline() {
    const q = quoteData;
    document.getElementById('timeline').innerHTML = `
      <div class="timeline-item">
        <div class="timeline-dot"></div>
        <div><div class="timeline-text">Quote created</div><div class="timeline-date">${formatDate(q.created_at)}</div></div>
      </div>
      ${q.status !== 'open' ? `<div class="timeline-item">
        <div class="timeline-dot"></div>
        <div><div class="timeline-text">Status: ${q.status.replace(/_/g,' ')}</div><div class="timeline-date">${formatDate(q.updated_at)}</div></div>
      </div>` : ''}
      ${q.last_activity_at ? `<div class="timeline-item">
        <div class="timeline-dot"></div>
        <div><div class="timeline-text">Last activity</div><div class="timeline-date">${formatDate(q.last_activity_at)}</div></div>
      </div>` : ''}
    `;
  }

  function renderCustomerInfo() {
    const c = customerData || {};
    document.getElementById('customer-info').innerHTML = `
      <div class="customer-info-row"><label>Name</label><span>${[c.first_name, c.last_name].filter(Boolean).join(' ') || '—'}</span></div>
      <div class="customer-info-row">
        <label>Email</label>
        <span style="flex:1;font-size:0.82rem;word-break:break-all">${c.email || '—'}</span>
        ${c.email ? `<button class="copy-btn" onclick="navigator.clipboard.writeText('${c.email}')">Copy</button>` : ''}
      </div>
      <div class="customer-info-row"><label>Location</label><span>${c.location || '—'}</span></div>
      ${c.phone ? `<div class="customer-info-row"><label>Phone</label><span>${c.phone}</span></div>` : ''}
      <div style="margin-top:0.8rem">
        <a href="index.html?customer=${c.id}" style="font-size:0.8rem;color:var(--navy-light)">View all quotes by this customer →</a>
      </div>
    `;
  }

  function subscribeRealtime() {
    sb.channel('admin-messages-' + quoteId)
      .on('postgres_changes', {
        event: 'INSERT', schema: 'public', table: 'messages',
        filter: `quote_id=eq.${quoteId}`
      }, (payload) => {
        const msg = payload.new;
        const matchesThread = (msg.is_internal && currentThread === 'internal') || (!msg.is_internal && currentThread === 'customer');
        if (!matchesThread) return;
        const scroll = document.getElementById('messages-scroll');
        const atBottom = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 60;
        const empty = scroll.querySelector('p');
        if (empty) scroll.innerHTML = '';
        scroll.insertAdjacentHTML('beforeend', buildBubble(msg));
        if (atBottom) scroll.scrollTop = scroll.scrollHeight;
      })
      .subscribe();
  }

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    document.getElementById('loading').style.display = 'none';
    if (!session) { document.getElementById('denied').style.display = ''; return; }
    const { data: adminRow } = await sb.from('admin_users').select('*').eq('id', session.user.id).single();
    if (!adminRow) { document.getElementById('denied').style.display = ''; return; }
    adminUser = adminRow;

    const { data: q } = await sb.from('quotes').select('*').eq('id', quoteId).single();
    if (!q) { document.getElementById('denied').style.display = ''; return; }
    quoteData = q;

    const carName = `${q.marque || ''} ${q.model || ''} ${q.year ? '(' + q.year + ')' : ''}`.trim();
    document.getElementById('bread-car').textContent = carName;
    document.title = carName + ' — Admin';

    document.getElementById('status-select').value = q.status || 'open';
    document.getElementById('internal-notes').value = q.internal_notes || '';

    const { data: cust } = await sb.from('customers').select('*').eq('id', q.customer_id).single();
    customerData = cust;

    document.getElementById('main').style.display = '';
    renderCarFields();
    renderTimeline();
    renderCustomerInfo();

    await Promise.all([loadAdmins(), loadItems(), loadMessages(), loadReminder()]);
    subscribeRealtime();
  })();
</script>
</body>
</html>
